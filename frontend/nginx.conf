server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → api-gateway (strips /api prefix)
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://api-gateway:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# /api/authgateway/auth/login
#     ↓ rewrite
# /authgateway/auth/login
#     ↓ proxy_pass
# api-gateway:8080/authgateway/auth/login  ✅
