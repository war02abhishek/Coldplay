apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: coldplay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 18219526/coldplay-auth-service:1.0
          ports:
            - containerPort: 7777
          # readinessProbe:
          #   httpGet:
          #     path: /auth/get
          #     port: 7777
          #   initialDelaySeconds: 60
          #   periodSeconds: 15
          #   failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-updated
  namespace: coldplay
spec:
  selector:
    app: auth-service
  ports:
    - port: 7777
      targetPort: 7777
  type: ClusterIP
