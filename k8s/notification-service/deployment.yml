apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: coldplay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: 18219526/coldplay-notification-service:1.0
          ports:
            - containerPort: 8083
          # readinessProbe:
          #   httpGet:
          #     path: /redis/get
          #     port: 8083
          #   initialDelaySeconds: 60
          #   periodSeconds: 15
          #   failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: coldplay
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
